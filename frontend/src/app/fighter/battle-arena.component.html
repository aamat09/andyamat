<div class="arena-page">
  <canvas #battleCanvas></canvas>

  <div class="controls" *ngIf="finished && result">
    <button class="btn-gold" (click)="watchAgain()">WATCH AGAIN</button>
    <button class="btn-outline" (click)="goProfile(result.fighter1.name)">
      {{ result.fighter1.name }}
    </button>
    <button class="btn-outline" (click)="goProfile(result.fighter2.name)">
      {{ result.fighter2.name }}
    </button>
    <button class="btn-outline btn-sm" (click)="goHome()">HOME</button>
  </div>

  <div class="loading" *ngIf="error">{{ error }}</div>
</div>
