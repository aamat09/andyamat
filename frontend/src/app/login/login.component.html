<div class="login-page">
  <div class="login-card">
    <h1>A Boy Story</h1>
    <p class="subtitle">Admin Login</p>

    <div class="form-group">
      <label>USERNAME</label>
      <input type="text" [(ngModel)]="username" placeholder="Username" (keyup.enter)="login()">
    </div>

    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" [(ngModel)]="password" placeholder="Password" (keyup.enter)="login()">
    </div>

    <div class="error" *ngIf="error">{{error}}</div>

    <button (click)="login()" [disabled]="loading || !username.trim() || !password">
      {{loading ? 'LOADING...' : 'LOGIN'}}
    </button>
  </div>
</div>
